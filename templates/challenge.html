<!DOCTYPE html><html>
<head><title>15 Minute Challenge</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"><style>

.timer{
position:fixed;
top:10px;
right:20px;
background:red;
color:white;
padding:10px 20px;
font-size:20px;
border-radius:8px;
}

.question{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}

</style></head><body><h2>15 Minute Challenge</h2><div id="timer" class="timer">
15:00
</div><form id="quizForm" method="POST" action="/result">{% for q in questions %}

<div class="question">
<p><b>{{ loop.index }}. {{ q[2] }}</b></p><label>
<input type="radio" name="q{{ q[0] }}" value="a"> {{ q[3] }}<br>

<input type="radio" name="q{{ q[0] }}" value="b"> {{ q[4] }}<br>

<input type="radio" name="q{{ q[0] }}" value="c"> {{ q[5] }}<br>

<input type="radio" name="q{{ q[0] }}" value="d"> {{ q[6] }}<br>
</label></div>{% endfor %}

<button type="submit">Submit Challenge</button>

</form><script>

document.addEventListener("DOMContentLoaded", function(){

let time = 900; // 15 minutes

let timer = setInterval(function(){

let minutes = Math.floor(time / 60);
let seconds = time % 60;

if(seconds < 10){
seconds = "0" + seconds;
}

document.getElementById("timer").innerHTML =
minutes + ":" + seconds;

time--;

if(time < 0){

clearInterval(timer);

document.getElementById("quizForm").submit();

}

},1000);

});

</script></body>
</html>
