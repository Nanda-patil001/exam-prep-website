<!DOCTYPE html>
<html>
<head>

<title>Leaderboard</title>

<style>

table{
width:75%;
margin:auto;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#1e88e5;
color:white;
}

.gold{background:#fff8dc;}
.silver{background:#f5f5f5;}
.bronze{background:#ffe4c4;}
.me{background:#c8e6c9;}

</style>

</head>

<body>

<h2 style="text-align:center">🏆 Leaderboard</h2>

<div style="
background:#e3f2fd;
padding:15px;
margin:20px auto;
width:300px;
text-align:center;
border-radius:10px;
font-size:18px;
">

⭐ Your Rank: #{{ your_rank }}

</div>

<table>

<tr>
<th>Rank</th>
<th>Username</th>
<th>Level</th>
<th>XP</th>
<th>🔥 Streak</th>
</tr>

{% for u in users %}

<tr
class="
{% if loop.index==1 %}gold
{% elif loop.index==2 %}silver
{% elif loop.index==3 %}bronze
{% endif %}
{% if u[0]==session.user_id %} me {% endif %}
">

<td>
{% if loop.index==1 %}🥇
{% elif loop.index==2 %}🥈
{% elif loop.index==3 %}🥉
{% else %}
{{ loop.index }}
{% endif %}
</td>

<td>{{ u[1] }}</td>
<td>{{ u[3] }}</td>
<td>{{ u[2] }}</td>
<td>{{ u[4] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
